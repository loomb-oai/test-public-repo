[build-system]
requires = ["setuptools>=69", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "loomb-test"
version = "0.8.0"
description = "Demo Python package for the SDK release action simulation."
readme = "README.md"
requires-python = ">=3.10"
license = "MIT"

[tool.setuptools.packages.find]
where = ["src"]
