name: "SDK Release Action"
description: "Wraps Release Please and models the SDK release train for a monorepo."

inputs:
  mode:
    description: "Optional local override. Defaults to auto event routing."
    required: false
    default: "auto"
  config-file:
    description: "Path to the repo-owned SDK release configuration"
    required: false
    default: ".github/sdk-release.yml"
  release-please-config-file:
    description: "Path to the Release Please manifest config."
    required: false
    default: ".github/release-please-config.json"
  release-please-manifest-file:
    description: "Path to the Release Please versions manifest."
    required: false
    default: ".release-please-manifest.json"
  release-tag:
    description: "Optional local override for registry-publish simulation."
    required: false
  github-app-id:
    description: "GitHub App ID used for future cross-repo release operations."
    required: false
  github-app-private-key:
    description: "GitHub App private key used for cross-repo release operations."
    required: false

outputs:
  release-version:
    description: "Version handled by the simulated release action"
    value: ${{ steps.run.outputs.release-version }}
  release-tag:
    description: "Tag handled by the simulated release action"
    value: ${{ steps.run.outputs.release-tag }}

runs:
  using: "composite"
  steps:
    - name: Resolve requested operation
      id: operation
      shell: bash
      env:
        SDK_RELEASE_MODE: ${{ inputs.mode }}
      run: |
        operation="$SDK_RELEASE_MODE"
        if [ -z "$operation" ] || [ "$operation" = "auto" ]; then
          if [ "$GITHUB_EVENT_NAME" = "workflow_dispatch" ]; then
            operation="${{ github.event.inputs.operation }}"
          elif [ "$GITHUB_EVENT_NAME" = "repository_dispatch" ]; then
            operation="${{ github.event.client_payload.operation }}"
          elif [ "$GITHUB_EVENT_NAME" = "push" ] && [[ "$GITHUB_REF_NAME" == rc/* ]]; then
            operation="refresh-rc"
          elif [ "$GITHUB_EVENT_NAME" = "release" ]; then
            operation="registry-publish"
          else
            operation="noop"
          fi
        fi

        printf 'operation=%s\n' "$operation" >> "$GITHUB_OUTPUT"

    - name: Create GitHub App token
      id: github-app-token
      if: >-
        ${{
          github.repository == 'loomb-oai/test-private-repo' &&
          inputs.github-app-id != '' &&
          inputs.github-app-private-key != ''
        }}
      uses: actions/create-github-app-token@v3
      with:
        app-id: ${{ inputs.github-app-id }}
        private-key: ${{ inputs.github-app-private-key }}
        owner: ${{ github.repository_owner }}
        repositories: |
          test-private-repo
          test-public-repo
        permission-contents: write
        permission-issues: write
        permission-pull-requests: write
        permission-workflows: write

    - name: Refresh Release Please plan
      id: release-please-plan
      if: >-
        ${{
          github.repository == 'loomb-oai/test-private-repo' &&
          steps.operation.outputs.operation != 'final' &&
          steps.operation.outputs.operation != 'registry-publish' &&
          github.event_name != 'release' &&
          !(github.event_name == 'push' && startsWith(github.ref_name, 'rc/'))
        }}
      uses: googleapis/release-please-action@v4
      with:
        token: ${{ steps.github-app-token.outputs.token || github.token }}
        config-file: ${{ inputs.release-please-config-file }}
        manifest-file: ${{ inputs.release-please-manifest-file }}
        skip-github-release: true

    - id: run
      shell: bash
      env:
        SDK_RELEASE_MODE: ${{ steps.operation.outputs.operation }}
        SDK_RELEASE_CONFIG: ${{ inputs.config-file }}
        SDK_RELEASE_RELEASE_PLEASE_CONFIG: ${{ inputs.release-please-config-file }}
        SDK_RELEASE_RELEASE_PLEASE_MANIFEST: ${{ inputs.release-please-manifest-file }}
        SDK_RELEASE_RELEASE_PLEASE_PRS_CREATED: ${{ steps.release-please-plan.outputs.prs_created }}
        SDK_RELEASE_RELEASE_PLEASE_PRS: ${{ steps.release-please-plan.outputs.prs }}
        SDK_RELEASE_RELEASE_TAG: ${{ inputs.release-tag }}
        SDK_RELEASE_GH_APP_ID: ${{ inputs.github-app-id }}
        SDK_RELEASE_GH_APP_PRIVATE_KEY: ${{ inputs.github-app-private-key }}
        SDK_RELEASE_GH_APP_TOKEN: ${{ steps.github-app-token.outputs.token }}
      run: node "$GITHUB_WORKSPACE/scripts/sdk-release-action.mjs"
