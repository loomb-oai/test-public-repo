name: Weekly RC Cut

on:
  schedule:
    - cron: "1 0 * * 1"
      timezone: "America/Los_Angeles"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  cut_rc:
    if: github.repository == 'loomb-oai/test-private-repo'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node for npm Trusted Publishing
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
          package-manager-cache: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install Python build tool
        run: python3 -m pip install build

      - name: Run sample SDK release action
        uses: ./.github/actions/sdk-release-sim
        with:
          mode: cut-rc
          config: sdk-release.config.json
          public-repo-token: ${{ secrets.PUBLIC_REPO_TOKEN }}
          private-repo-token: ${{ secrets.GITHUB_TOKEN }}
