name: sdk-release

on:
  workflow_call:
    inputs:
      config-file:
        description: "Path to the repo-owned SDK release configuration"
        required: false
        type: string
        default: .github/sdk-release.yml
      operation:
        description: "Release operation to run, or auto to infer it from the caller event"
        required: false
        type: string
        default: auto
      rc-branch:
        description: "RC branch for final release promotion"
        required: false
        type: string
        default: ""
      release-tag:
        description: "Release tag for mirrored registry publish runs"
        required: false
        type: string
        default: ""

permissions:
  contents: write
  issues: write
  pull-requests: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    environment: main
    outputs:
      publish-registries: ${{ steps.sdk-release.outputs.publish-registries }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node for npm Trusted Publishing
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
          package-manager-cache: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install Python build tool
        run: python3 -m pip install build

      - name: Run local SDK release action
        id: sdk-release
        uses: ./.github/actions/sdk-release-action
        with:
          mode: ${{ inputs.operation }}
          config-file: ${{ inputs.config-file }}
          rc-branch: ${{ inputs.rc-branch }}
          release-tag: ${{ inputs.release-tag }}
          github-app-id: ${{ secrets.SDK_RELEASE_GH_APP_ID }}
          github-app-private-key: ${{ secrets.SDK_RELEASE_GH_APP_PRIVATE_KEY }}

      - name: Upload PyPI distributions
        if: ${{ steps.sdk-release.outputs.publish-registries == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: pypi-dists
          path: ${{ steps.sdk-release.outputs.pypi-packages-dir }}

  publish-pypi:
    needs: release
    if: ${{ needs.release.outputs.publish-registries == 'true' }}
    runs-on: ubuntu-latest
    environment: main
    permissions:
      id-token: write
    steps:
      - name: Download PyPI distributions
        uses: actions/download-artifact@v4
        with:
          name: pypi-dists
          path: dist/pypi

      - name: Publish Python package distributions to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/pypi
