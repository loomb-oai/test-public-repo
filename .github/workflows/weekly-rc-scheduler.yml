name: weekly-rc-scheduler

on:
  schedule:
    - cron: "*/10 * * * *"
      timezone: "America/Los_Angeles"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger release-bot RC cut
        uses: actions/github-script@v8
        with:
          script: |
            await github.rest.repos.createDispatchEvent({
              owner: context.repo.owner,
              repo: context.repo.repo,
              event_type: "sdk-release",
              client_payload: {
                operation: "cut-rc",
                "schedule-id": "weekly-rc"
              }
            });
