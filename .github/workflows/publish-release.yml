name: Publish Merged Demo Release

on:
  pull_request:
    types: [closed]
    branches:
      - main

permissions:
  contents: write

jobs:
  publish:
    if: >-
      github.event.pull_request.merged == true &&
      startsWith(github.event.pull_request.head.ref, 'release/v')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout merged release state
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python build tool
        run: python3 -m pip install build

      - name: Run simulated SDK release action
        id: release
        uses: ./.github/actions/sdk-release-sim
        with:
          mode: publish
          config: sdk-release.config.json
          public-repo-token: ${{ secrets.PUBLIC_REPO_TOKEN }}
          private-repo-token: ${{ secrets.GITHUB_TOKEN }}
