name: release-bot

on:
  workflow_dispatch:
    inputs:
      operation:
        description: "Release operation to run immediately"
        required: true
        type: choice
        options:
          - alpha
          - beta
          - cut-rc
          - final
      rc-branch:
        description: "Required for final releases, e.g. rc/0.2.0"
        required: false
        type: string
  repository_dispatch:
    types:
      - sdk-release
  push:
    branches:
      - "rc/**"
  release:
    types:
      - published

permissions:
  contents: write
  issues: write
  pull-requests: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node for npm Trusted Publishing
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
          package-manager-cache: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install Python build tool
        run: python3 -m pip install build

      - name: Run local SDK release action
        uses: ./.github/actions/sdk-release-action
        with:
          config-file: .github/sdk-release.yml
