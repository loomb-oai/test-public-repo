name: release-bot

on:
  workflow_dispatch:
    inputs:
      operation:
        description: "Release operation to run immediately"
        required: true
        type: choice
        options:
          - publish-alpha
          - publish-beta
          - cut-rc
          - publish-prod
      rc-branch:
        description: "Required for publish-prod releases, e.g. rc/0.2.0"
        required: false
        type: string
  repository_dispatch:
    types:
      - sdk-release
  push:
    branches:
      - main
      - "rc/**"
  release:
    types:
      - published

jobs:
  release:
    runs-on: ubuntu-latest
    environment: main
    permissions:
      contents: write
      issues: write
      pull-requests: write
      id-token: write
    outputs:
      pypi-publish-ready: ${{ steps.sdk-release.outputs.pypi-publish-ready }}
      pypi-artifact-name: ${{ steps.sdk-release.outputs.pypi-artifact-name }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.release.tag_name || github.ref }}

      - name: Run SDK release orchestration
        id: sdk-release
        uses: loomb-oai/sdk-release-action@main
        with:
          rc-branch: ${{ github.event.inputs['rc-branch'] || '' }}
          release-tag: ${{ github.event.release.tag_name || '' }}
          github-app-id: ${{ secrets.SDK_RELEASE_GH_APP_ID }}
          github-app-private-key: ${{ secrets.SDK_RELEASE_GH_APP_PRIVATE_KEY }}

  publish-pypi:
    needs: release
    if: ${{ needs.release.outputs.pypi-publish-ready == 'true' }}
    runs-on: ubuntu-latest
    environment: main
    permissions:
      id-token: write
    steps:
      - name: Download PyPI distributions
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.release.outputs.pypi-artifact-name }}
          path: dist/pypi

      - name: Publish Python package distributions to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/pypi
