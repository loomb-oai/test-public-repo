name: release-bot

on:
  workflow_dispatch:
    inputs:
      operation:
        description: "Release operation to run immediately"
        required: true
        type: choice
        options:
          - publish-alpha
          - publish-nightly
          - cut-rc
          - publish-prod
      rc-branch:
        description: "Required for publish-prod releases, e.g. rc/0.2.0"
        required: false
        type: string
  repository_dispatch:
    types:
      - sdk-release
  push:
    branches:
      - main
      - "rc/**"
  release:
    types:
      - published

jobs:
  release:
    permissions:
      contents: write
      issues: write
      pull-requests: write
      id-token: write
    uses: loomb-oai/sdk-release-action/.github/workflows/release-bot.yml@main
    with:
      config-file: .github/sdk-release.yml

  publish-pypi:
    needs: release
    if: ${{ needs.release.outputs.pypi-publish-ready == 'true' }}
    runs-on: ubuntu-latest
    environment: main
    permissions:
      id-token: write
    steps:
      - name: Download PyPI distributions
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.release.outputs.pypi-artifact-name }}
          path: dist/pypi

      - name: Publish Python package distributions to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/pypi
