name: release-bot
run-name: ${{ format('{0} - Release Bot', github.event.inputs.operation || '🤖') }}

on:
  workflow_dispatch:
    inputs:
      operation:
        description: "Release operation to run immediately"
        required: true
        type: choice
        options:
          - PUB_ALPHA
          - PUB_BETA
          - CUT_RC
          - PROMOTE_RC
      rc-ref:
        description: "Required for PROMOTE_RC releases, e.g. rc/0.2.0 or v0.2.0-rc.4"
        required: false
        type: string
  push:
    branches:
      - main
      - "rc/**"
  release:
    types:
      - published

jobs:
  release:
    runs-on: ubuntu-latest
    environment: main
    permissions:
      contents: write
      issues: write
      pull-requests: write
      id-token: write
    outputs:
      pypi-publish-ready: ${{ steps.sdk-release.outputs.pypi-publish-ready }}
      pypi-artifact-name: ${{ steps.sdk-release.outputs.pypi-artifact-name }}
    steps:
      - name: Create GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.SDK_RELEASE_GH_APP_ID }}
          private-key: ${{ secrets.SDK_RELEASE_GH_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          permission-contents: write
          permission-issues: write
          permission-pull-requests: write
          permission-workflows: write

      - name: Checkout SDK release action
        uses: actions/checkout@v4
        with:
          repository: loomb-oai/sdk-release-action
          ref: main
          token: ${{ steps.app-token.outputs.token }}
          path: .sdk-release-action

      - name: Run SDK release orchestration
        id: sdk-release
        uses: ./.sdk-release-action
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          rc-ref: ${{ github.event.inputs['rc-ref'] || '' }}
          release-tag: ${{ github.event.release.tag_name || '' }}

  publish-pypi:
    needs: release
    if: ${{ needs.release.outputs.pypi-publish-ready == 'true' }}
    runs-on: ubuntu-latest
    environment: main
    permissions:
      id-token: write
    steps:
      - name: Download PyPI distributions
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.release.outputs.pypi-artifact-name }}
          path: dist/pypi

      - name: Publish Python package distributions to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/pypi
