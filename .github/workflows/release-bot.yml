name: release-bot

on:
  workflow_dispatch:
    inputs:
      operation:
        description: "Release operation to run immediately"
        required: true
        type: choice
        options:
          - alpha
          - beta
          - cut-rc
          - final
      rc-branch:
        description: "Required for final releases, e.g. rc/0.2.0"
        required: false
        type: string
  repository_dispatch:
    types:
      - sdk-release
  push:
    branches:
      - main
      - "rc/**"
  release:
    types:
      - published

permissions:
  contents: write
  issues: write
  pull-requests: write
  id-token: write

jobs:
  release:
    uses: ./.github/workflows/sdk-release.yml
    with:
      config-file: .github/sdk-release.yml
      operation: ${{ github.event.inputs.operation || github.event.client_payload.operation || 'auto' }}
      rc-branch: ${{ github.event.inputs['rc-branch'] || '' }}
      release-tag: ${{ github.event.release.tag_name || '' }}
    secrets: inherit
